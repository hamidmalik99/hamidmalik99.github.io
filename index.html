<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hamid — Web Developer for Australian Agencies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #212121;
      --ink-muted: #5a5a5a;
      --ink-faint: #9a9a9a;
      --paper: #fafaf9;
      --paper-warm: #f4f0e8;
      --accent: #d97706;
      --accent-light: #fef3c7;
      --teal: #b45309;
      --teal-light: #fef9ee;
      --card-bg: #ffffff;
      --border: rgba(33,33,33,0.10);
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 250, 249, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(1.5rem, 5vw, 4rem);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.01em;
      text-decoration: none;
    }
    .nav-logo em {
      font-style: italic;
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--ink); }

    .nav-cta {
      background: var(--ink) !important;
      color: var(--paper) !important;
      padding: 0.45rem 1.1rem !important;
      border-radius: 2rem !important;
      font-size: 0.8rem !important;
      text-transform: none !important;
      letter-spacing: 0.01em !important;
      transition: background 0.2s, transform 0.15s !important;
    }
    .nav-cta:hover { background: var(--accent) !important; transform: translateY(-1px); }

    .nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }
    .nav-hamburger span {
      width: 22px; height: 2px;
      background: var(--ink);
      border-radius: 2px;
      transition: all 0.3s;
    }

    /* ── HERO ── */
    #hero {
      padding: clamp(3rem, 7vw, 5rem) clamp(1.5rem, 5vw, 4rem) clamp(4rem, 7vw, 6rem);
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 3rem;
    }

    .hero-content {
      flex: 1;
      max-width: 650px;
    }

    .hero-visual {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      max-width: 450px;
    }

    .hero-emoji {
      font-size: clamp(5rem, 10vw, 8rem);
      line-height: 1;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #b45309;
      background: #fef3c7;
      padding: 0.35rem 0.9rem;
      border-radius: 2rem;
      margin-bottom: 2rem;
    }
    .hero-eyebrow::before {
      content: '';
      width: 7px; height: 7px;
      background: #d97706;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .hero-headline {
      font-family: var(--serif);
      font-size: clamp(2.8rem, 6.5vw, 5.5rem);
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: var(--ink);
      max-width: 780px;
      margin-bottom: 1.6rem;
    }
    .hero-headline em {
      font-style: italic;
      color: var(--accent);
    }

      font-size: clamp(1rem, 1.8vw, 1.2rem);
